<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF STORZ • OFFICIAL RECEIPT</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --success: #00ffa3; --dark: #050505; --card: #0f0f0f; --border: #1a1a1a; }
        
        body { 
            background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .receipt-container {
            background: var(--card); border: 1px solid var(--border);
            width: 100%; max-width: 380px; border-radius: 24px; padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        .receipt-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--gold), #ffecb3, var(--gold));
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        .header p { font-size: 0.7rem; color: #555; margin: 5px 0 0; text-transform: uppercase; letter-spacing: 1px; }

        .status-badge {
            background: rgba(0, 255, 163, 0.1); color: var(--success);
            padding: 8px 15px; border-radius: 12px; font-size: 0.7rem;
            font-weight: 900; display: inline-block; margin-bottom: 25px;
        }

        .item-detail {
            border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border);
            padding: 20px 0; margin-bottom: 25px;
        }

        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
        .row .label { color: #666; }
        .row .value { font-family: 'JetBrains Mono', monospace; font-weight: bold; text-align: right; }

        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #000; border-radius: 15px; margin-bottom: 20px;
        }
        .total-label { font-size: 0.7rem; font-weight: 900; color: var(--gold); }
        .total-value { font-size: 1.2rem; font-weight: 900; color: #fff; }

        .footer-note {
            text-align: center; font-size: 0.65rem; color: #444; line-height: 1.5;
            margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;
        }

        .btn-back {
            display: block; text-align: center; background: #fff; color: #000;
            text-decoration: none; padding: 15px; border-radius: 15px;
            font-weight: 900; font-size: 0.8rem; margin-top: 25px; transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="receipt-container">
        <div class="header">
            <h1>RHF STORZ</h1>
            <p>Digital Asset Receipt</p>
        </div>

        <div style="text-align: center;">
            <div class="status-badge">PAYMENT CONFIRMED</div>
        </div>

        <div class="item-detail" id="struk-content">
            <p style="text-align:center; color:#333;">Syncing data...</p>
        </div>

        <div class="total-row">
            <div class="total-label">TOTAL PAID</div>
            <div class="total-value" id="total-val">Rp 0</div>
        </div>

        <div class="footer-note">
            Terima kasih telah berbelanja di RHF STORZ.<br>
            Simpan struk ini sebagai bukti kepemilikan asset digital Anda.<br>
            <b>© 2026 RHF ARCHITECT SYSTEM</b>
        </div>

        <a href="shop.html" class="btn-back">KEMBALI KE TOKO</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil Transaction ID dari URL (contoh: nota.html?tid=RHF12345)
        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('tid');

        if(tid) {
            db.ref('transactions/' + tid).on('value', snap => {
                const t = snap.val();
                if(t) {
                    // Render Rincian Struk
                    document.getElementById('struk-content').innerHTML = `
                        <div class="row">
                            <span class="label">ID Transaksi</span>
                            <span class="value" style="color:var(--gold)">#${t.tid}</span>
                        </div>
                        <div class="row">
                            <span class="label">Nama Pembeli</span>
                            <span class="value">${t.userName}</span>
                        </div>
                        <div class="row">
                            <span class="label">Produk</span>
                            <span class="value">${t.productName}</span>
                        </div>
                        <div class="row">
                            <span class="label">Harga Item</span>
                            <span class="value">Rp ${t.basePrice.toLocaleString()}</span>
                        </div>
                        <div class="row">
                            <span class="label">Kode Unik</span>
                            <span class="value">+${t.uniqueCode}</span>
                        </div>
                        <div class="row" style="margin-top:15px;">
                            <span class="label">Waktu</span>
                            <span class="value" style="font-size:0.7rem">${new Date(t.timestamp).toLocaleString('id-ID')}</span>
                        </div>
                        <div class="row">
                            <span class="label">Metode</span>
                            <span class="value">Automatic Verification</span>
                        </div>
                    `;
                    document.getElementById('total-val').innerText = `Rp ${t.total.toLocaleString()}`;
                } else {
                    document.getElementById('struk-content').innerHTML = `<p style="text-align:center; color:red;">Transaksi Tidak Ditemukan</p>`;
                }
            });
        }
    </script>
</body>
</html>
