<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF STORZ • OFFICIAL RECEIPT</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --success: #00ffa3; --dark: #050505; --card: #0f0f0f; --border: #1a1a1a; }
        
        body { 
            background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .receipt-container {
            background: var(--card); border: 1px solid var(--border);
            width: 100%; max-width: 400px; border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.2rem; color: var(--gold); margin: 0; font-weight: 900; }

        /* --- STATUS AREA --- */
        #status-box {
            text-align: center; padding: 15px; border-radius: 15px;
            margin-bottom: 25px; font-size: 0.8rem; font-weight: bold;
        }
        .pending-box { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        .success-box { background: rgba(0, 255, 163, 0.1); color: var(--success); border: 1px solid var(--success); }

        /* --- DETAILS --- */
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
        .label { color: #555; }
        .value { font-family: 'JetBrains Mono', monospace; font-weight: bold; }

        .divider { border-top: 1px dashed var(--border); margin: 20px 0; }

        /* --- ASSET ACCESS (HIDDEN BY DEFAULT) --- */
        #download-area { display: none; margin-top: 25px; }
        
        .btn-download {
            display: block; text-align: center; background: #fff; color: #000;
            text-decoration: none; padding: 18px; border-radius: 15px;
            font-weight: 900; font-size: 0.85rem; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .btn-refresh {
            background: none; border: 1px solid #333; color: #555;
            padding: 8px; border-radius: 8px; font-size: 0.6rem; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="receipt-container">
        <div class="header">
            <h1>RHF STORZ RECEIPT</h1>
            <p style="font-size: 0.6rem; color: #444; letter-spacing: 2px;">OFFICIAL TRANSACTION LOG</p>
        </div>

        <div id="status-box" class="pending-box">
            WAITING FOR VERIFICATION...
        </div>

        <div id="receipt-data">
            <div class="info-row">
                <span class="label">Transaction ID</span>
                <span class="value" id="res-tid">#------</span>
            </div>
            <div class="info-row">
                <span class="label">Customer</span>
                <span class="value" id="res-user">Loading...</span>
            </div>
            <div class="info-row">
                <span class="label">Product</span>
                <span class="value" id="res-product">---</span>
            </div>
            <div class="divider"></div>
            <div class="info-row">
                <span class="label">Base Price</span>
                <span class="value" id="res-base">Rp 0</span>
            </div>
            <div class="info-row">
                <span class="label">Unique Code</span>
                <span class="value" style="color:var(--gold)" id="res-code">+0</span>
            </div>
            <div class="info-row" style="margin-top: 10px;">
                <span class="label" style="color:#fff; font-weight: 900;">TOTAL PAID</span>
                <span class="value" style="font-size: 1.1rem; color:var(--success)" id="res-total">Rp 0</span>
            </div>
        </div>

        <div id="download-area">
            <div class="divider"></div>
            <p style="text-align: center; font-size: 0.7rem; color: var(--success); margin-bottom: 15px;">✓ ASSET ACCESS GRANTED</p>
            <a href="#" id="file-link" class="btn-download">AMBIL BARANG SEKARANG</a>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-refresh" onclick="location.reload()">REFRESH STATUS MANUAL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('tid');

        if(tid) {
            // Real-time Watcher (Persistent)
            db.ref('transactions/' + tid).on('value', snap => {
                const t = snap.val();
                if(t) {
                    renderReceipt(t);
                } else {
                    document.body.innerHTML = "<h2 style='color:red; text-align:center; padding-top:50px;'>TRANSID NOT FOUND</h2>";
                }
            });
        }

        function renderReceipt(t) {
            // Fill Data
            document.getElementById('res-tid').innerText = "#" + t.tid;
            document.getElementById('res-user').innerText = t.userName;
            document.getElementById('res-product').innerText = t.productName;
            document.getElementById('res-base').innerText = "Rp " + t.basePrice.toLocaleString();
            document.getElementById('res-code').innerText = "+" + t.uniqueCode;
            document.getElementById('res-total').innerText = "Rp " + t.total.toLocaleString();

            const sBox = document.getElementById('status-box');
            const dArea = document.getElementById('download-area');

            if(t.status === 'Success') {
                sBox.innerText = "PAYMENT VERIFIED";
                sBox.className = "success-box";
                dArea.style.display = "block";
                
                // Ambil link file dari database produk (Logic: ambil data produk berdasarkan ID)
                // Sementara kita arahkan ke link demo atau placeholder
                document.getElementById('file-link').href = "https://your-storage-link.com/asset/" + t.tid;
            } else {
                sBox.innerText = "WAITING FOR ADMIN VERIFICATION";
                sBox.className = "pending-box";
                dArea.style.display = "none";
            }
        }
    </script>
</body>
</html>
