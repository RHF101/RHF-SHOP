<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF COMMAND CENTER V12</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37; --success: #00ffa3; --danger: #ff3e3e; --dark: #050505;
            --card: #0f0f0f; --border: #1a1a1a; --ai: #00f2ff;
        }

        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        .container { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 1100px) { .container { grid-template-columns: 350px 1fr; } }

        .widget { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        h2 { font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; border-left: 3px solid var(--gold); padding-left: 10px; }

        .table-wrap { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 600px; }
        th { text-align: left; padding: 12px; color: #444; border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid #111; vertical-align: middle; }

        input, textarea { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        .btn-core { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        
        .btn-action { padding: 6px 10px; border-radius: 6px; font-weight: 900; cursor: pointer; border: none; font-size: 0.65rem; margin-right: 5px; }
        .btn-edit { background: var(--ai); color: #000; }
        .btn-delete { background: var(--danger); color: #fff; }
        .btn-approve { background: var(--success); color: #000; }

        #gate-keeper { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: 900; font-size: 0.6rem; }
        .badge-pending { background: rgba(212, 175, 55, 0.1); color: var(--gold); }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div style="text-align:center; width: 300px;">
            <h1 style="color:var(--gold); font-weight: 900;">RHF COMMAND</h1>
            <input type="password" id="sys-pass" placeholder="ACCESS KEY">
            <button class="btn-core" onclick="authorize()">UNLOCK SYSTEM</button>
        </div>
    </div>

    <nav>
        <div style="font-weight:900;">RHF<span style="color:var(--gold)">CORE</span> V12</div>
        <div style="font-size:0.6rem; color:var(--success)">● WAREHOUSE CONNECTED</div>
    </nav>

    <div class="container" id="admin-ui" style="display:none;">
        <div class="side">
            <div class="widget">
                <h2>Total Revenue</h2>
                <div id="total-rev" style="font-size: 1.8rem; font-weight: 900; font-family: 'JetBrains Mono'; color: var(--success);">Rp 0</div>
            </div>

            <div class="widget">
                <h2>Deploy New Asset</h2>
                <input type="text" id="p-name" placeholder="Product Name">
                <input type="number" id="p-price" placeholder="Price (IDR)">
                <input type="text" id="p-img" placeholder="Image URL (Optional)">
                <textarea id="p-desc" placeholder="Brief description..."></textarea>
                <button class="btn-core" onclick="pushItem()">PUSH TO STORE</button>
            </div>
            
            <div class="widget">
                <h2>Bot Config</h2>
                <input type="text" id="tg-token" placeholder="Bot Token">
                <input type="text" id="tg-id" placeholder="Chat ID">
                <button class="btn-core" style="background:#222; color:#fff; font-size:0.7rem;" onclick="saveConfig()">UPDATE TELEGRAM</button>
            </div>
        </div>

        <div class="main">
            <div class="widget">
                <h2>Product Warehouse (Stock & Price)</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>PRODUCT NAME</th>
                                <th>PRICE</th>
                                <th>DESCRIPTION</th>
                                <th>CONTROL</th>
                            </tr>
                        </thead>
                        <tbody id="product-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="widget">
                <h2>Master Audit Log</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>TIME</th>
                                <th>TID / USER</th>
                                <th>PRODUCT</th>
                                <th>TOTAL</th>
                                <th>STATUS</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="audit-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function authorize() {
            if(document.getElementById('sys-pass').value === "gacoruncek73@gmail.com") {
                document.getElementById('gate-keeper').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'grid';
                initSystem();
            }
        }

        function sendTele(msg) {
            const token = localStorage.getItem('tgToken');
            const id = localStorage.getItem('tgId');
            if(token && id) fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
        }

        function saveConfig() {
            localStorage.setItem('tgToken', document.getElementById('tg-token').value);
            localStorage.setItem('tgId', document.getElementById('tg-id').value);
            alert("Bot Config Updated!");
        }

        function initSystem() {
            document.getElementById('tg-token').value = localStorage.getItem('tgToken') || "";
            document.getElementById('tg-id').value = localStorage.getItem('tgId') || "";

            // 1. MONITOR TRANSACTIONS
            db.ref('transactions').on('value', snap => {
                const table = document.getElementById('audit-table');
                let html = ''; let revenue = 0;
                if(!snap.exists()) return;

                const items = []; snap.forEach(c => { items.push(c.val()); });
                items.reverse().forEach(t => {
                    if(t.status === 'Success') revenue += t.total;
                    html += `<tr>
                        <td>${new Date(t.timestamp).toLocaleTimeString()}</td>
                        <td><b style="color:var(--gold)">#${t.tid}</b><br><small>${t.userName}</small></td>
                        <td>${t.productName}</td>
                        <td>Rp ${t.total.toLocaleString()}<br><small>Code: ${t.uniqueCode}</small></td>
                        <td><span class="badge badge-${t.status.toLowerCase()}">${t.status}</span></td>
                        <td>${t.status === 'Pending' ? `<button class="btn-action btn-approve" onclick="approve('${t.tid}', ${t.total})">APPROVE</button>` : '<b>✓</b>'}</td>
                    </tr>`;
                });
                table.innerHTML = html;
                document.getElementById('total-rev').innerText = "Rp " + revenue.toLocaleString();
            });

            // 2. MONITOR WAREHOUSE (PRODUCTS)
            db.ref('products').on('value', snap => {
                const pTable = document.getElementById('product-table');
                let html = '';
                snap.forEach(c => {
                    const p = c.val();
                    const key = c.key;
                    html += `<tr>
                        <td><b>${p.name}</b></td>
                        <td>Rp ${p.price.toLocaleString()}</td>
                        <td style="color:#666">${p.desc || '-'}</td>
                        <td>
                            <button class="btn-action btn-edit" onclick="editPrice('${key}', ${p.price})">PRICE</button>
                            <button class="btn-action btn-delete" onclick="deleteItem('${key}', '${p.name}')">DEL</button>
                        </td>
                    </tr>`;
                });
                pTable.innerHTML = html;
            });

            // 3. SOUND ALERT
            db.ref('transactions').limitToLast(1).on('child_added', snap => {
                const data = snap.val();
                if(Date.now() - data.timestamp < 10000) {
                    document.getElementById('alert-sound').play();
                    sendTele(`🔔 PESANAN BARU!\n\nID: #${data.tid}\nItem: ${data.productName}\nTotal: Rp ${data.total.toLocaleString()}`);
                }
            });
        }

        // --- PRODUCT MANAGEMENT LOGIC ---
        function pushItem() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const desc = document.getElementById('p-desc').value;
            const img = document.getElementById('p-img').value;

            if(name && price) {
                db.ref('products').push().set({ 
                    name, price, desc, 
                    image: img || "https://via.placeholder.com/150",
                    timestamp: firebase.database.ServerValue.TIMESTAMP 
                }).then(() => {
                    alert("Product Pushed to Store!");
                    document.getElementById('p-name').value = '';
                    document.getElementById('p-price').value = '';
                });
            }
        }

        function editPrice(key, current) {
            const newPrice = prompt("Enter new price for this asset:", current);
            if(newPrice) {
                db.ref('products/' + key).update({ price: parseInt(newPrice) });
            }
        }

        function deleteItem(key, name) {
            if(confirm(`Delete ${name} from warehouse? This cannot be undone.`)) {
                db.ref('products/' + key).remove();
            }
        }

        function approve(tid, total) {
            if(confirm(`Confirm balance Rp ${total.toLocaleString()}?`)) {
                db.ref('transactions/' + tid).update({ status: 'Success' }).then(() => {
                    sendTele(`✅ SALDO TERBUKTI MASUK!\n\nID: #${tid}\nTotal: Rp ${total.toLocaleString()}`);
                });
            }
        }
    </script>
</body>
</html>
