<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF CORE V5 • ARCHITECT SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37; --blue: #0088ff; --dark: #050505;
            --card: #0f0f0f; --border: #1a1a1a; --success: #00ffa3; --danger: #ff3e3e;
        }

        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* LOGIN GATE */
        #gate-keeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .terminal-box {
            background: var(--card); border: 2px solid var(--border);
            padding: 30px; border-radius: 24px; width: 85%; max-width: 400px; text-align: center;
        }

        /* MAIN UI */
        #main-ui { display: none; padding: 15px; }
        .header-panel { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 950px) { .grid-layout { grid-template-columns: 400px 1fr; } }

        .widget { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        h2 { font-size: 0.75rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin: 0 0 20px; }

        input, select, textarea { 
            background: #000; border: 1px solid var(--border); padding: 14px; 
            border-radius: 12px; color: #fff; width: 100%; box-sizing: border-box; 
            font-family: 'JetBrains Mono', monospace; outline: none; transition: 0.3s; margin-bottom: 12px;
        }
        textarea { height: 100px; resize: none; }
        input:focus, textarea:focus { border-color: var(--gold); }

        .btn-core { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }

        /* LISTS */
        .p-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: #000; border-radius: 12px; margin-bottom: 8px; border: 1px solid #111; }
        .p-thumb { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: #444; font-size: 0.6rem; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="terminal-box">
            <h1 style="font-weight:900;">RHF STORZ</h1>
            <p style="color: #444; font-size: 0.65rem; margin-bottom: 20px;">SYSTEM OVERRIDE V5.0</p>
            <input type="text" id="user-core" placeholder="USER">
            <input type="password" id="pass-core" placeholder="PASSWORD">
            <button class="btn-core" onclick="verifyAccess()">AUTHORIZE</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="header-panel">
            <h1 style="margin:0; font-size: 1.1rem; font-weight: 900;">ADMIN PANEL</h1>
            <button onclick="exitSystem()" style="background:none; border: 1px solid var(--danger); color: var(--danger); padding: 8px 16px; border-radius: 12px; cursor: pointer;">EXIT</button>
        </div>

        <div class="grid-layout">
            <div class="col-left">
                <div class="widget">
                    <h2>Deploy Product</h2>
                    <input type="text" id="p-name" placeholder="Nama Produk">
                    <input type="number" id="p-price" placeholder="Harga (Rp)">
                    <input type="text" id="p-img" placeholder="Link Gambar">
                    
                    <textarea id="p-desc" placeholder="Deskripsi Produk (Gunakan baris baru untuk list fitur)"></textarea>
                    
                    <select id="p-label" onchange="toggleLimitInput()">
                        <option value="Biasa">Biasa</option>
                        <option value="Menengah">Menengah</option>
                        <option value="Premium">Premium</option>
                        <option value="Limited">Limited</option>
                    </select>

                    <div id="limit-box" style="display:none;">
                        <label style="font-size:0.6rem; color:var(--gold);">BARANG HILANG DALAM (MENIT):</label>
                        <input type="number" id="p-expiry" placeholder="Contoh: 60 (1 Jam)">
                    </div>

                    <button class="btn-core" onclick="pushProduct()">DEPLOY TO DATABASE</button>
                </div>

                <div class="widget">
                    <h2>Active Warehouse</h2>
                    <div id="inventory-list"></div>
                </div>
            </div>

            <div class="col-right">
                <div class="widget">
                    <h2>Live Transactions</h2>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead><tr><th>Client</th><th>Item</th><th>Nominal</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody id="trx-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function verifyAccess() {
            const u = document.getElementById('user-core').value;
            const p = document.getElementById('pass-core').value;
            if(u === "RHF STORZ" && p === "gacoruncek73@gmail.com") {
                sessionStorage.setItem("rhf_auth", "gacor_v5");
                bootSystem();
            } else { alert("WRONG CREDENTIALS!"); }
        }

        function bootSystem() {
            if(sessionStorage.getItem("rhf_auth") === "gacor_v5") {
                document.getElementById('gate-keeper').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                syncInventory();
                syncTransactions();
            }
        }
        if(sessionStorage.getItem("rhf_auth") === "gacor_v5") bootSystem();

        function toggleLimitInput() {
            const label = document.getElementById('p-label').value;
            document.getElementById('limit-box').style.display = (label === 'Limited') ? 'block' : 'none';
        }

        function pushProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            const label = document.getElementById('p-label').value;
            const expiryMin = parseInt(document.getElementById('p-expiry').value);

            if(!name || !price) return alert("DATA MINIMAL NAMA & HARGA!");

            const pid = "P" + Date.now();
            const data = {
                id: pid, name, price, image: img, desc, label,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            // Jika Limited, hitung waktu selesainya
            if(label === 'Limited' && expiryMin > 0) {
                data.expiryAt = Date.now() + (expiryMin * 60000);
            }

            db.ref('products/' + pid).set(data).then(() => {
                alert("PRODUCT DEPLOYED!");
                location.reload();
            });
        }

        function syncInventory() {
            db.ref('products').on('value', snap => {
                const list = document.getElementById('inventory-list');
                list.innerHTML = '';
                const now = Date.now();
                
                snap.forEach(child => {
                    const p = child.val();
                    
                    // AUTO-CLEANUP: Hapus jika expired
                    if(p.expiryAt && now > p.expiryAt) {
                        db.ref('products/' + child.key).remove();
                        return;
                    }

                    list.innerHTML += `
                        <div class="p-row">
                            <img src="${p.image}" class="p-thumb" onerror="this.src='https://via.placeholder.com/50'">
                            <div style="flex:1">
                                <div style="font-size:0.75rem; font-weight:bold;">${p.name}</div>
                                <div style="font-size:0.6rem; color:#555;">${p.label}</div>
                            </div>
                            <button onclick="killProduct('${child.key}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                        </div>`;
                });
            });
        }

        function syncTransactions() {
            db.ref('transactions').on('value', snap => {
                const body = document.getElementById('trx-body');
                body.innerHTML = '';
                snap.forEach(child => {
                    const t = child.val();
                    body.innerHTML += `
                        <tr>
                            <td>${t.userName}</td>
                            <td>${t.productName}</td>
                            <td>Rp ${t.total.toLocaleString()}</td>
                            <td>${t.status}</td>
                            <td><button onclick="modTrx('${child.key}', 'Success')">✅</button></td>
                        </tr>`;
                });
            });
        }

        function killProduct(id) { if(confirm("DELETE?")) db.ref('products/' + id).remove(); }
        function modTrx(id, stat) { db.ref('transactions/' + id).update({ status: stat }); }
        function exitSystem() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
