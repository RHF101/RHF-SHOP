<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center • RHF STORZ</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #141414; --border: #222; --success: #27ae60; --process: #f39c12; --danger: #e74c3c; }
        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        h2 { color: var(--gold); font-size: 0.9rem; margin: 0 0 15px; text-transform: uppercase; letter-spacing: 1px; }
        .form-grid { display: grid; gap: 10px; }
        input, select { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; outline: none; width: 100%; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 10px; color: #555; font-size: 0.7rem; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.8rem; }
        .status-pill { padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .pill-pending { background: #333; color: #fff; }
        .pill-process { background: var(--process); color: #000; }
        .pill-success { background: var(--success); color: #fff; }
        .action-btn { padding: 6px 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; margin-right: 5px; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 style="margin:0; font-size: 1.1rem; color: var(--gold);">RHF ADMIN</h1>
            <button onclick="location.href='shop.html'" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:5px; font-size:0.7rem;">BALIK KE TOKO</button>
        </header>

        <div class="card">
            <h2>➕ TAMBAH PRODUK</h2>
            <div class="form-grid">
                <input type="text" id="p-name" placeholder="Nama Produk">
                <input type="number" id="p-price" placeholder="Harga (Contoh: 50000)">
                <input type="text" id="p-img" placeholder="Link Gambar (URL)">
                <select id="p-label">
                    <option value="Biasa">Biasa</option>
                    <option value="Menengah">Menengah</option>
                    <option value="Premium">Premium</option>
                    <option value="Limited">Limited</option>
                </select>
            </div>
            <button class="btn-gold" onclick="submitProduct()">PUBLIKASIKAN</button>
        </div>

        <div class="card">
            <h2>📦 DAFTAR TRANSAKSI</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Produk</th>
                            <th>Total + Unik</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="trx-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- LOAD TRANSAKSI (TANPA PROTEKSI EMAIL) ---
        function loadTransactions() {
            db.ref('transactions').on('value', snap => {
                const list = document.getElementById('trx-list');
                list.innerHTML = '';
                const data = snap.val();
                if (!data) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#444;">Belum ada pesanan.</td></tr>';
                    return;
                }

                Object.keys(data).reverse().forEach(key => {
                    const t = data[key];
                    list.innerHTML += `
                        <tr>
                            <td><strong>${t.userName}</strong></td>
                            <td>${t.productName}</td>
                            <td><strong style="color:var(--gold)">Rp ${t.total.toLocaleString()}</strong><br><small style="color:#555">Kode: ${t.uniqueCode}</small></td>
                            <td><span class="status-pill pill-${t.status.toLowerCase()}">${t.status}</span></td>
                            <td>
                                ${t.status === 'Pending' ? `<button class="action-btn" style="background:var(--process)" onclick="updateStatus('${key}', 'Process')">Proses</button>` : ''}
                                ${t.status === 'Process' ? `<button class="action-btn" style="background:var(--success)" onclick="updateStatus('${key}', 'Success')">Selesai</button>` : ''}
                                <button class="action-btn" style="background:var(--danger)" onclick="deleteTrx('${key}')">Del</button>
                            </td>
                        </tr>`;
                });
            });
        }

        function submitProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            const label = document.getElementById('p-label').value;
            if(!name || !price) return alert("Nama & Harga wajib diisi!");

            db.ref('products/' + Date.now()).set({
                id: Date.now(), name, price, image: img, label
            }).then(() => { alert("Produk Berhasil Ditambah!"); location.reload(); });
        }

        function updateStatus(id, stat) { db.ref('transactions/' + id).update({ status: stat }); }
        function deleteTrx(id) { if(confirm("Hapus pesanan ini?")) db.ref('transactions/' + id).remove(); }

        // Jalankan langsung saat halaman dibuka
        loadTransactions();
    </script>
</body>
</html>
