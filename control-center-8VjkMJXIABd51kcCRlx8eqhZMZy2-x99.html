<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel • RHF STORZ</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #141414;
            --success: #27ae60;
            --danger: #e74c3c;
            --border: #222;
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Layar Kunci Keamanan */
        #admin-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .header h1 { color: var(--gold); font-size: 1.5rem; margin: 0; }

        /* Stats Card */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card span { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0; color: var(--gold); }

        /* Transaction Table */
        .table-container {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: #1a1a1a;
            color: #666;
            text-align: left;
            padding: 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .status-pending { background: #f39c12; color: #000; }
        .status-success { background: var(--success); color: #fff; }
        .status-failed { background: var(--danger); color: #fff; }

        .btn-group { display: flex; gap: 5px; }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: #888;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="admin-lock">
        <h2 style="color: var(--gold);">ARCHITECT VERIFICATION</h2>
        <p style="color: #444;">Memvalidasi akses gacoruncek73@gmail.com...</p>
    </div>

    <div class="header">
        <h1>RHF STORZ • ADMIN</h1>
        <button class="btn-logout" onclick="logout()">Keluar</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span>Transaksi Pending</span>
            <h2 id="pending-count">0</h2>
        </div>
        <div class="stat-card">
            <span>Total Pendapatan</span>
            <h2 id="total-revenue">Rp 0</h2>
        </div>
        <div class="stat-card">
            <span>Produk Terjual</span>
            <h2 id="total-sold">0</h2>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Pembeli</th>
                    <th>Produk</th>
                    <th>Total (Kode Unik)</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="trx-table">
                </tbody>
        </table>
    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // KUNCI AKSES TUNGGAL (UID KAMU)
        const MASTER_UID = "8VjkMJXIABd51kcCRlx8eqhZMZy2";

        // Proteksi Halaman
        auth.onAuthStateChanged(user => {
            if (user && user.uid === MASTER_UID) {
                document.getElementById('admin-lock').style.display = 'none';
                loadTransactions();
            } else if (user) {
                alert("Akses Ditolak! Kamu bukan admin.");
                window.location.replace("shop.html");
            } else {
                window.location.replace("index.html");
            }
        });

        // Ambil Data Transaksi
        function loadTransactions() {
            db.ref('transactions').on('value', snapshot => {
                const data = snapshot.val();
                const tbody = document.getElementById('trx-table');
                tbody.innerHTML = '';

                let pending = 0;
                let revenue = 0;
                let sold = 0;

                for (let id in data) {
                    const trx = data[id];
                    
                    if (trx.status === 'Pending') pending++;
                    if (trx.status === 'Success') {
                        revenue += trx.total;
                        sold++;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>${trx.date || '-'}</td>
                            <td>${trx.userName}<br><small style="color:#555">${trx.userEmail}</small></td>
                            <td>${trx.productName}</td>
                            <td>Rp ${trx.total.toLocaleString('id-ID')}</td>
                            <td><span class="status status-${trx.status.toLowerCase()}">${trx.status}</span></td>
                            <td class="btn-group">
                                ${trx.status === 'Pending' ? `
                                    <button class="btn-action btn-success" onclick="updateStatus('${id}', 'Success', '${trx.userUid}', '${trx.productId}')">Selesai</button>
                                    <button class="btn-action btn-danger" onclick="updateStatus('${id}', 'Failed')">Gagal</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                }

                document.getElementById('pending-count').innerText = pending;
                document.getElementById('total-revenue').innerText = "Rp " + revenue.toLocaleString('id-ID');
                document.getElementById('total-sold').innerText = sold;
            });
        }

        // Update Status & Beri Izin Rating ke Pembeli
        function updateStatus(id, status, userUid, productId) {
            if (confirm(`Ubah status transaksi ke ${status}?`)) {
                db.ref('transactions/' + id).update({ status: status })
                .then(() => {
                    if (status === 'Success') {
                        // Tambahkan ke histori user agar mereka bisa memberi rating
                        db.ref('users/' + userUid + '/history/' + productId).set(true);
                    }
                    alert("Status Berhasil Diperbarui!");
                });
            }
        }

        function logout() {
            auth.signOut().then(() => window.location.replace("index.html"));
        }
    </script>
</body>
</html>
