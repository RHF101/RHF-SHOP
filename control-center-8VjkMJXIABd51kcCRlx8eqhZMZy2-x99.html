<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inti Arsitek • RHF STORZ</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #141414;
            --border: #222;
            --success: #27ae60;
            --process: #f39c12;
            --danger: #e74c3c;
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Lock Screen Overlay */
        #admin-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px; margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        h2 { color: var(--gold); font-size: 1rem; margin-top: 0; margin-bottom: 20px; border-left: 3px solid var(--gold); padding-left: 10px; }

        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
        }

        input, select {
            background: #000; border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: #fff; outline: none;
        }

        input:focus { border-color: var(--gold); }

        .btn-gold {
            background: var(--gold); color: #000; border: none;
            padding: 12px 25px; border-radius: 8px; font-weight: bold;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; color: #555; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        .status-pill {
            padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;
        }
        .pill-pending { background: #333; color: #fff; }
        .pill-process { background: var(--process); color: #000; }
        .pill-success { background: var(--success); color: #fff; }

        .action-btn {
            padding: 6px 12px; border-radius: 5px; border: none; font-weight: bold;
            cursor: pointer; font-size: 0.75rem; margin-right: 5px;
        }

        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="admin-lock">
        <h1 style="color: var(--gold); letter-spacing: 5px;">RHF CORE</h1>
        <p id="lock-msg">Checking Architect Credentials...</p>
    </div>

    <div class="container">
        <header>
            <div>
                <h1 style="margin:0; font-size: 1.2rem; color: var(--gold);">ADMIN DASHBOARD</h1>
                <small style="color:#555">Terminal Kendali Arsitek</small>
            </div>
            <button class="btn-logout" onclick="adminLogout()">LOGOUT</button>
        </header>

        <div class="card">
            <h2>➕ TAMBAH PRODUK BARU</h2>
            <div class="form-grid">
                <input type="text" id="p-name" placeholder="Nama Produk">
                <input type="number" id="p-price" placeholder="Harga Dasar (Rp)">
                <input type="text" id="p-img" placeholder="URL Gambar Produk">
                <select id="p-label">
                    <option value="Biasa">Label: Biasa</option>
                    <option value="Menengah">Label: Menengah</option>
                    <option value="Premium">Label: Premium</option>
                    <option value="Limited">Label: Limited</option>
                </select>
            </div>
            <button class="btn-gold" onclick="submitProduct()">POSTING PRODUK</button>
        </div>

        <div class="card">
            <h2>📦 MONITOR TRANSAKSI & KODE UNIK</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Produk</th>
                            <th>Total (Cek Kode Unik)</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="trx-list">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = "gacoruncek73@gmail.com";

        // PROTEKSI BERBASIS EMAIL (GACOR & CEPAT)
        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('admin-lock').style.display = 'none';
                loadTransactions();
            } else {
                alert("Akses Ditolak! Hanya untuk Arsitek.");
                window.location.replace("shop.html");
            }
        });

        function submitProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            const label = document.getElementById('p-label').value;

            if(!name || !price || !img) return alert("Isi semua data!");

            const id = "P-" + Date.now();
            db.ref('products/' + id).set({
                id: id, name: name, price: price, image: img, label: label
            }).then(() => {
                alert("Produk Berhasil Ditambahkan!");
                location.reload();
            });
        }

        function loadTransactions() {
            db.ref('transactions').on('value', snap => {
                const list = document.getElementById('trx-list');
                list.innerHTML = '';
                const data = snap.val();

                if (!data) return list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Belum ada pesanan masuk.</td></tr>';

                Object.keys(data).reverse().forEach(key => {
                    const t = data[key];
                    list.innerHTML += `
                        <tr>
                            <td><strong>${t.userName}</strong></td>
                            <td>${t.productName}</td>
                            <td>
                                <strong style="color:var(--gold)">Rp ${t.total.toLocaleString()}</strong><br>
                                <small>Unik: ${t.uniqueCode}</small>
                            </td>
                            <td><span class="status-pill pill-${t.status.toLowerCase()}">${t.status}</span></td>
                            <td>
                                ${t.status === 'Pending' ? `<button class="action-btn" style="background:var(--process)" onclick="updateStatus('${key}', 'Process')">Proses</button>` : ''}
                                ${t.status === 'Process' ? `<button class="action-btn" style="background:var(--success)" onclick="updateStatus('${key}', 'Success')">Selesai</button>` : ''}
                                <button class="action-btn" style="background:var(--danger)" onclick="deleteTrx('${key}')">Hapus</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function updateStatus(id, newStatus) {
            db.ref('transactions/' + id).update({ status: newStatus });
        }

        function deleteTrx(id) {
            if(confirm("Hapus data ini?")) db.ref('transactions/' + id).remove();
        }

        function adminLogout() {
            auth.signOut().then(() => window.location.replace("index.html"));
        }
    </script>
</body>
</html>
