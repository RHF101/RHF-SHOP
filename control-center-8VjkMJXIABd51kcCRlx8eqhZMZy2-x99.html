<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF CORE V6 • FIX DEPLOY</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #0f0f0f; --border: #1a1a1a; --danger: #ff3e3e; }
        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        
        #gate-keeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .terminal-box { background: var(--card); border: 2px solid var(--border); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }

        #main-ui { display: none; }
        .widget { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        input, select, textarea { 
            background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; 
            color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: 'JetBrains Mono';
        }
        .btn-push { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; }
        
        .p-item { display: flex; align-items: center; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #111; }
        .p-img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="terminal-box">
            <h2 style="color:var(--gold)">RHF ACCESS</h2>
            <input type="text" id="user-core" placeholder="USER">
            <input type="password" id="pass-core" placeholder="PASSWORD">
            <button class="btn-push" onclick="login()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="widget">
            <h2 style="color:var(--gold); font-size: 1rem;">UPLOAD DAGANGAN</h2>
            <input type="text" id="p-name" placeholder="Nama Barang">
            <input type="number" id="p-price" placeholder="Harga (Angka)">
            <input type="text" id="p-img" placeholder="URL Gambar">
            <textarea id="p-desc" placeholder="Deskripsi Barang" style="height:80px;"></textarea>
            <select id="p-label">
                <option value="Biasa">Biasa</option>
                <option value="Premium">Premium</option>
                <option value="Limited">Limited</option>
            </select>
            <button class="btn-push" onclick="pushToShop()">UPLOAD SEKARANG</button>
        </div>

        <div class="widget">
            <h2 style="color:var(--gold); font-size: 1rem;">GUDANG (LIVE)</h2>
            <div id="warehouse">Loading data...</div>
        </div>
    </div>

    <script>
        // CONFIG HARUS SAMA PERSIS DENGAN SHOP
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const u = document.getElementById('user-core').value;
            const p = document.getElementById('pass-core').value;
            if(u === "RHF STORZ" && p === "gacoruncek73@gmail.com") {
                document.getElementById('gate-keeper').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                loadWarehouse();
            } else { alert("Salah!"); }
        }

        function pushToShop() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            const label = document.getElementById('p-label').value;

            if(!name || !price) return alert("Nama & Harga Wajib!");

            // Kita pakai .push() agar Firebase otomatis membuat ID unik yang benar
            const productRef = db.ref('products').push();
            productRef.set({
                id: productRef.key, // ID otomatis dari Firebase
                name: name,
                price: price,
                image: img || "https://via.placeholder.com/150",
                desc: desc || "-",
                label: label,
                timestamp: Date.now()
            }).then(() => {
                alert("BERHASIL TERPASANG DI SHOP!");
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
            }).catch(e => alert("Gagal: " + e));
        }

        function loadWarehouse() {
            db.ref('products').on('value', snap => {
                const area = document.getElementById('warehouse');
                area.innerHTML = '';
                if(!snap.exists()) { area.innerHTML = "Kosong."; return; }

                snap.forEach(child => {
                    const p = child.val();
                    area.innerHTML += `
                        <div class="p-item">
                            <img src="${p.image}" class="p-img">
                            <div style="flex:1">
                                <b style="font-size:0.8rem">${p.name}</b><br>
                                <small style="color:var(--gold)">Rp ${p.price.toLocaleString()}</small>
                            </div>
                            <button onclick="hapus('${child.key}')" style="background:none; border:none; color:var(--danger); font-weight:bold;">✕</button>
                        </div>
                    `;
                });
            });
        }

        function hapus(id) { if(confirm("Hapus?")) db.ref('products/' + id).remove(); }
    </script>
</body>
</html>
