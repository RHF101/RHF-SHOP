<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace • RHF STORZ</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Tambahan style khusus untuk floating buttons */
        .floating-support {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 9998;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .floating-support:hover {
            border-color: var(--gold);
            transform: scale(1.05);
        }

        #loader {
            text-align: center;
            padding: 50px;
            color: var(--gold);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">RHF STORZ</a>
        <div id="user-info" style="font-size: 0.8rem; display: flex; align-items: center; gap: 15px;">
            <span id="display-name" style="color: var(--gold); font-weight: 600;"></span>
            <button class="btn-outline" onclick="logout()" style="padding: 5px 12px;">Logout</button>
        </div>
    </nav>

    <div class="filter-bar">
        <div class="chip active" onclick="filterData('All', this)">Semua</div>
        <div class="chip" onclick="filterData('Premium', this)">Premium</div>
        <div class="chip" onclick="filterData('Limited', this)">Limited</div>
    </div>

    <div class="container">
        <div id="loader">Memuat Katalog Mewah...</div>
        
        <div id="shop-grid" class="product-grid">
            </div>
    </div>

    <a href="chat.html" class="floating-support">
        💬 RHF Support
    </a>

    <div id="admin-portal"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shop.js"></script>

    <script>
        // Script khusus untuk mendeteksi Arsitek (Radit)
        const MASTER_UID = "8VjkMJXIABd51kcCRlx8eqhZMZy2";

        auth.onAuthStateChanged(user => {
            if (user) {
                // Tampilkan nama di Nav
                document.getElementById('display-name').innerText = user.displayName;

                // Cek apakah ini Akun Arsitek
                if (user.uid === MASTER_UID) {
                    const portal = document.getElementById('admin-portal');
                    portal.innerHTML = `
                        <a href="control-center-8VjkMJXIABd51kcCRlx8eqhZMZy2-x99.html" style="
                            position: fixed; 
                            bottom: 25px; 
                            right: 25px; 
                            background: linear-gradient(135deg, #d4af37, #f1c40f); 
                            color: #000; 
                            padding: 15px 25px; 
                            border-radius: 50px; 
                            font-weight: 800; 
                            text-decoration: none; 
                            z-index: 9999; 
                            box-shadow: 0 10px 25px rgba(212,175,55,0.4);
                            display: flex;
                            align-items: center;
                            gap: 10px;
                            border: 2px solid rgba(255,255,255,0.3);
                        ">
                            ⚙️ KELOLA TOKO
                        </a>
                    `;
                }
            } else {
                // Jika tidak login, tendang ke landing page
                window.location.replace("index.html");
            }
        });

        // Pastikan loader hilang jika terjadi error atau data kosong
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'none';
        }, 5000);
    </script>
</body>
</html>
