<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF STORZ - High Performance Shop</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --gold: #d4af37; --dark: #050505; --card: #0f0f0f; --border: #1a1a1a;
        }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Grid Produk */
        #shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Kolom untuk HP */
            gap: 12px;
        }

        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .img-product {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            background: #000;
        }

        .label-tag {
            position: absolute; top: 5px; left: 5px;
            font-size: 0.6rem; font-weight: bold; padding: 3px 8px;
            border-radius: 5px; color: #000;
        }
        .tag-limited { background: #ff3e3e; color: #fff; }
        .tag-premium { background: var(--gold); }
        .tag-biasa { background: #444; color: #fff; }

        .product-title { font-size: 0.85rem; margin: 10px 0 5px; font-weight: bold; }
        
        .product-desc { 
            font-size: 0.65rem; color: #666; 
            height: 32px; overflow: hidden; margin-bottom: 8px;
            line-height: 1.2;
        }

        .product-price { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; }

        .btn-buy {
            background: var(--gold); border: none; padding: 8px;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.2rem; color: var(--gold);">RHF STORZ</h1>
        <div id="user-info" style="font-size: 0.8rem;">Loading...</div>
    </div>

    <div id="shop-grid">
        </div>

    <script>
        // --- 1. CONFIG FIREBASE (WAJIB SAMA DENGAN ADMIN) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- 2. CEK LOGIN ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-info').innerText = "Arsitek: " + user.displayName;
                loadProducts();
            } else {
                window.location.replace("index.html");
            }
        });

        // --- 3. AMBIL DATA DARI DATABASE ---
        function loadProducts() {
            db.ref('products').on('value', snap => {
                const grid = document.getElementById('shop-grid');
                grid.innerHTML = '';
                const data = snap.val();
                const now = Date.now();

                if (!data) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Barang belum di-upload arsitek.</p>';
                    return;
                }

                Object.keys(data).forEach(key => {
                    const p = data[key];

                    // Cek Expired (Jika Limited)
                    if (p.expiryAt && now > p.expiryAt) {
                        return; // Jangan tampilkan jika sudah habis waktunya
                    }

                    const cleanDesc = p.desc ? p.desc.substring(0, 40) + "..." : "No description.";

                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="label-tag tag-${p.label.toLowerCase()}">${p.label}</div>
                            <img src="${p.image}" class="img-product" onerror="this.src='https://via.placeholder.com/150?text=RHF'">
                            <h4 class="product-title">${p.name}</h4>
                            <div class="product-desc">${cleanDesc}</div>
                            <p class="product-price">Rp ${p.price.toLocaleString()}</p>
                            <button class="btn-buy" onclick="buy('${p.id}', '${p.name}', ${p.price})">BELI</button>
                        </div>
                    `;
                });
            });
        }

        function buy(id, name, price) {
            const code = Math.floor(Math.random() * 899) + 100;
            const total = price + code;
            if (confirm(`Beli ${name}?\nTotal Transfer: Rp ${total.toLocaleString()}`)) {
                const tid = "RHF" + Date.now().toString().slice(-4);
                db.ref('transactions/' + tid).set({
                    userName: auth.currentUser.displayName,
                    productName: name,
                    total: total,
                    uniqueCode: code,
                    status: 'Pending'
                }).then(() => alert("Pesanan Masuk! Tunggu Verifikasi."));
            }
        }
    </script>
</body>
</html>
