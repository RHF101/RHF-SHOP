<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF STORZ • PREMIUM ASSETS</title>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37; --dark: #050505; --card: #0f0f0f;
            --border: #1a1a1a; --text: #ffffff; --dim: #888888;
        }

        body {
            background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif;
            margin: 0; padding-bottom: 100px; overflow-x: hidden;
        }

        /* --- UI COMPONENTS --- */
        nav {
            padding: 20px 25px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }

        .user-profile { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        .user-profile img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gold); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .hero { text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; margin: 0; }
        .hero span { color: var(--gold); }

        /* --- PRODUCT GRID --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .card img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 18px; margin-bottom: 15px; background: #000;
        }

        .card h3 { margin: 10px 0 5px; font-size: 1.1rem; }
        .card p { font-size: 0.75rem; color: var(--dim); line-height: 1.5; flex-grow: 1; }

        .price-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 1.2rem;
            color: var(--gold); font-weight: 700; margin: 15px 0;
        }

        .btn-buy {
            background: var(--text); color: #000; border: none;
            padding: 15px; border-radius: 14px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-buy:active { transform: scale(0.95); }

        /* --- LOADING OVERLAY --- */
        #loader {
            position: fixed; inset: 0; background: var(--dark);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader"><h1>RHF STORAGE...</h1></div>

    <nav>
        <div style="font-weight: 900; letter-spacing: 1px;">RHF<span style="color:var(--gold)">STORZ</span></div>
        <div class="user-profile" id="user-info">
            <span id="user-name">Guest</span>
            <img id="user-pic" src="https://via.placeholder.com/30" alt="P">
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>PREMIUM <span>ASSETS</span></h1>
            <p style="color:var(--dim); font-size: 0.9rem;">Digital quality for high-end architecture.</p>
        </div>

        <div class="grid" id="product-list">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;

        // 1. AUTH CHECK
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('loader').style.display = 'none';
                loadProducts();
            } else {
                window.location.href = "index.html";
            }
        });

        // 2. LOAD PRODUCTS FROM WAREHOUSE
        function loadProducts() {
            db.ref('products').on('value', snap => {
                const list = document.getElementById('product-list');
                let html = '';

                if(!snap.exists()) {
                    list.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Warehouse sedang kosong...</p>";
                    return;
                }

                snap.forEach(child => {
                    const p = child.val();
                    const key = child.key;
                    html += `
                        <div class="card">
                            <img src="${p.image || 'https://via.placeholder.com/300'}" alt="Item">
                            <h3>${p.name}</h3>
                            <p>${p.desc || 'No description available for this premium asset.'}</p>
                            <div class="price-tag">Rp ${p.price.toLocaleString()}</div>
                            <button class="btn-buy" onclick="checkout('${key}', '${p.name}', ${p.price})">Get Access</button>
                        </div>
                    `;
                });
                list.innerHTML = html;
            });
        }

        // 3. SECURE CHECKOUT WITH UNIQUE CODE
        async function checkout(id, name, price) {
            const tid = "TID-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            const uniqueCode = Math.floor(Math.random() * 899) + 100; // 100-999
            const finalTotal = price + uniqueCode;

            const confirmBuy = confirm(`Beli ${name}?\nTotal Pembayaran: Rp ${finalTotal.toLocaleString()}\n(Sudah termasuk kode unik)`);

            if(confirmBuy) {
                const txData = {
                    tid: tid,
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    productName: name,
                    basePrice: price,
                    uniqueCode: uniqueCode,
                    total: finalTotal,
                    status: 'Pending',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };

                // Push to Firebase
                await db.ref('transactions/' + tid).set(txData);

                // Redirect ke Nota
                window.location.href = `nota.html?tid=${tid}`;
            }
        }
    </script>
</body>
</html>
