<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHF Shop • Koleksi Digital</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      margin: 0;
      padding: 0;
    }
    header {
      background: rgba(20,20,20,0.95);
      border-bottom: 1px solid #d4af37;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-family: 'Playfair Display', serif; color: #d4af37; margin: 0; }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s;
    }
    .product-card:hover {
      transform: translateY(-10px);
      border-color: #d4af37;
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
    }
    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .info {
      padding: 20px;
    }
    .price {
      color: #d4af37;
      font-size: 1.4rem;
      font-weight: 600;
    }
    button {
      background: #d4af37;
      color: #0f0f0f;
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      transition: 0.3s;
    }
    button:hover { background: #f0d68a; }
  </style>
</head>
<body>
  <header>
    <h1>RHF Shop</h1>
    <div>
      <span id="userName"></span> • 
      <a href="admin.html" id="adminLink" style="display:none; color:#d4af37; margin-left:20px;">Admin Panel</a>
    </div>
  </header>

  <div class="product-grid" id="productsList"></div>

  <script>
    const ADMIN_EMAIL = "gacoruncek73@gmail.com";
    // Inisialisasi Firebase (paste firebaseConfig + initializeApp + auth + db seperti sebelumnya)

    firebase.auth().onAuthStateChanged(user => {
      if (!user) return window.location.href = "login.html";

      document.getElementById("userName").textContent = user.displayName || user.email;
      if (user.email === ADMIN_EMAIL) document.getElementById("adminLink").style.display = "inline";

      loadProducts();
    });

    function loadProducts() {
      db.ref("products").on("value", snapshot => {
        const container = document.getElementById("productsList");
        container.innerHTML = "";
        snapshot.forEach(child => {
          const p = child.val();
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="info">
              <h3 style="margin:10px 0;">${p.name}</h3>
              <p style="color:#aaa; font-size:0.95rem;">${p.description || 'Produk digital premium'}</p>
              <div class="price">Rp ${Number(p.price).toLocaleString('id-ID')}</div>
              <small style="color:#888;">${p.type === 'auto' ? '✅ Instant Download' : '📧 Dikirim via Email'}</small>
              <button onclick="beliProduk('\( {child.key}', ' \){p.name}', \( {p.price}, ' \){p.type || 'manual'}')">Beli Sekarang</button>
            </div>
          `;
          container.appendChild(card);
        });
      });
    }

    function beliProduk(id, name, price, type) {
      // kode beliProduk sama seperti sebelumnya
      const user = firebase.auth().currentUser;
      const orderData = { /* sama seperti respons sebelumnya */ };
      db.ref("orders").push(orderData).then(() => {
        alert(`Order ${name} berhasil! Admin akan konfirmasi via email.`);
      });
    }
  </script>
</body>
</html>
