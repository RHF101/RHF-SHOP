<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF STORZ • OFFICIAL SHOP</title>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37; --dark: #050505; --card: #0f0f0f;
            --border: #1a1a1a; --text: #ffffff; --dim: #888888;
        }

        body {
            background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif;
            margin: 0; padding-bottom: 100px;
        }

        nav {
            padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }

        .user-profile { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); background: #222; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero { text-align: center; padding: 30px 0; }
        .hero h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; }
        .hero span { color: var(--gold); }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; transition: 0.3s;
            display: flex; flex-direction: column; position: relative;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .card img {
            width: 100%; height: 160px; object-fit: cover;
            border-radius: 16px; margin-bottom: 15px; background: #000;
        }

        .card h3 { margin: 5px 0; font-size: 1.1rem; font-weight: 900; }
        .card p { font-size: 0.75rem; color: var(--dim); line-height: 1.4; flex-grow: 1; }

        .price-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 1.2rem;
            color: var(--gold); font-weight: 700; margin: 15px 0;
        }

        .btn-buy {
            background: #fff; color: #000; border: none;
            padding: 14px; border-radius: 12px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 0.75rem;
            transition: 0.2s;
        }
        .btn-buy:active { transform: scale(0.95); }

        .btn-login {
            background: var(--gold); color: #000; border: none;
            padding: 8px 16px; border-radius: 10px; font-weight: 900;
            cursor: pointer; font-size: 0.7rem; text-transform: uppercase;
        }

        #loader {
            position: fixed; inset: 0; background: var(--dark);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader"><h1>RHF STORAGE...</h1></div>

    <nav>
        <div style="font-weight: 900; letter-spacing: 1px;">RHF<span style="color:var(--gold)">STORZ</span></div>
        <div class="user-profile" id="user-info">
            <span id="user-name">Guest Mode</span>
            <img id="user-pic" src="https://via.placeholder.com/32" alt="">
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>PREMIUM <span>ASSETS</span></h1>
            <p style="color:var(--dim); font-size: 0.8rem;">Browse our collection. Login to unlock access.</p>
        </div>

        <div class="grid" id="product-list"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;

        // 1. AUTH LOGIC (MODIFIKASI: IZINKAN GUEST LIHAT BARANG)
        auth.onAuthStateChanged(user => {
            const userInfo = document.getElementById('user-info');

            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const userData = snap.val();
                    if (userData && userData.access === 'banned') {
                        alert("AKSES DITOLAK: Akun Anda diblokir oleh Admin.");
                        auth.signOut();
                        location.reload();
                        return;
                    }

                    db.ref('users/' + user.uid).update({
                        name: user.displayName,
                        email: user.email,
                        lastLogin: firebase.database.ServerValue.TIMESTAMP,
                        access: userData ? userData.access : 'active'
                    });

                    currentUser = user;
                    document.getElementById('user-name').innerText = user.displayName;
                    document.getElementById('user-pic').src = user.photoURL;
                });
            } else {
                currentUser = null;
                userInfo.innerHTML = `
                    <button class="btn-login" onclick="window.location.href='index.html'">Login / Join</button>
                `;
            }
            
            document.getElementById('loader').style.display = 'none';
            loadProducts();
        });

        // 2. LIVE INVENTORY SYNC (TERBUKA UNTUK PUBLIK)
        function loadProducts() {
            db.ref('products').on('value', snap => {
                const list = document.getElementById('product-list');
                let html = '';
                if(!snap.exists()) {
                    list.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Warehouse Empty.</p>";
                    return;
                }
                snap.forEach(child => {
                    const p = child.val();
                    html += `
                        <div class="card">
                            <img src="${p.image || 'https://via.placeholder.com/300'}" alt="Item">
                            <h3>${p.name}</h3>
                            <p>${p.desc || 'No description available.'}</p>
                            <div class="price-tag">Rp ${p.price.toLocaleString()}</div>
                            <button class="btn-buy" onclick="checkout('${child.key}', '${p.name}', ${p.price})">Purchase</button>
                        </div>
                    `;
                });
                list.innerHTML = html;
            });
        }

        // 3. SECURE CHECKOUT (HANYA UNTUK YANG LOGIN)
        async function checkout(id, name, price) {
            // PROTEKSI: Jika belum login, tawarkan login
            if (!currentUser) {
                const wantLogin = confirm("Anda harus Login terlebih dahulu untuk melakukan pembelian.\n\nKe halaman Login?");
                if(wantLogin) window.location.href = "index.html";
                return;
            }

            const methodCode = prompt("PILIH METODE PEMBAYARAN:\n1. DANA\n2. OVO\n3. GOPAY\n\n(Ketik Angka 1, 2, atau 3)");
            
            let methodName = "";
            if(methodCode === "1") methodName = "DANA";
            else if(methodCode === "2") methodName = "OVO";
            else if(methodCode === "3") methodName = "GOPAY";
            else { alert("Pilihan tidak valid!"); return; }

            const tid = "TID-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            const uniqueCode = Math.floor(Math.random() * 899) + 100;
            const finalTotal = price + uniqueCode;

            if(confirm(`Konfirmasi Pesanan:\nItem: ${name}\nMetode: ${methodName}\nTotal: Rp ${finalTotal.toLocaleString()}`)) {
                const txData = {
                    tid: tid,
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    userEmail: currentUser.email,
                    productName: name,
                    method: methodName,
                    basePrice: price,
                    uniqueCode: uniqueCode,
                    total: finalTotal,
                    status: 'Pending',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };

                await db.ref('transactions/' + tid).set(txData);
                window.location.href = `nota.html?tid=${tid}`;
            }
        }
    </script>
</body>
</html>
