<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Digital • RHF STORZ</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
            --border: #222;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Header & Nav */
        header {
            padding: 20px 5%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Filter Section */
        .filter-bar {
            padding: 20px 5%;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .filter-bar::-webkit-scrollbar { display: none; }

        .chip {
            padding: 8px 20px;
            border-radius: 20px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }

        .chip.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: 600;
        }

        /* Shop Grid */
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* Product Card */
        .p-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            transition: 0.3s;
            position: relative;
        }

        .p-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .p-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .p-label {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .label-premium { background: var(--gold); color: #000; }
        .label-limited { background: #ff4757; color: #fff; }

        .p-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: var(--gold);
        }

        .p-desc {
            font-size: 0.8rem;
            color: #777;
            height: 35px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .p-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #222;
            padding-top: 12px;
        }

        .p-price { font-weight: bold; color: #fff; }
        .p-stock { font-size: 0.75rem; color: #444; }

        .btn-buy {
            width: 100%;
            margin-top: 15px;
            background: #d4af37;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-buy:hover { opacity: 0.9; }

        /* Loader */
        #loader { text-align: center; padding: 50px; color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand">RHF STORZ</a>
        <div class="user-nav">
            <span id="user-name" style="font-size: 0.9rem; color: #888;"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="filter-bar">
        <div class="chip active" onclick="filterData('All', this)">All Products</div>
        <div class="chip" onclick="filterData('Premium', this)">Premium</div>
        <div class="chip" onclick="filterData('Limited', this)">Limited Edition</div>
        <div class="chip" onclick="filterData('Standard', this)">Standard</div>
    </div>

    <div id="loader">Mengambil Koleksi...</div>
    <div class="shop-container" id="shop-grid"></div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allProducts = {};

        // Proteksi Halaman & User Info
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.replace("index.html");
            } else {
                document.getElementById('user-name').innerText = user.displayName;
                fetchProducts();
            }
        });

        // Ambil Data Produk
        function fetchProducts() {
            db.ref('products').on('value', snapshot => {
                allProducts = snapshot.val();
                renderProducts(allProducts);
                document.getElementById('loader').style.display = 'none';
            });
        }

        // Render Produk ke UI
        function renderProducts(products) {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';

            for (let id in products) {
                const p = products[id];
                const labelClass = p.label === 'Premium' ? 'label-premium' : (p.label === 'Limited' ? 'label-limited' : '');
                
                grid.innerHTML += `
                    <div class="p-card">
                        ${p.label ? `<span class="p-label ${labelClass}">${p.label}</span>` : ''}
                        <img src="${p.image || 'https://via.placeholder.com/260x160/111/d4af37?text=RHF+STORZ'}" class="p-img">
                        <h3 class="p-name">${p.name}</h3>
                        <p class="p-desc">${p.description || 'Tidak ada deskripsi.'}</p>
                        <div class="p-footer">
                            <span class="p-price">Rp ${p.price.toLocaleString()}</span>
                            <span class="p-stock">Stok: ${p.stock}</span>
                        </div>
                        <button class="btn-buy" onclick="handleBuy('${id}', '${p.name}', ${p.price})">Beli Sekarang</button>
                    </div>
                `;
            }
        }

        // Filter Fungsi
        function filterData(label, element) {
            // Update UI Chip
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            if (label === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = {};
                for (let id in allProducts) {
                    if (allProducts[id].label === label) filtered[id] = allProducts[id];
                }
                renderProducts(filtered);
            }
        }

        // Handle Beli (Integrasi ke Webhook/Admin nanti)
        function handleBuy(id, name, price) {
            const confirmBuy = confirm(`Konfirmasi pembelian ${name} seharga Rp ${price.toLocaleString()}?`);
            if (confirmBuy) {
                // Generate Kode Unik 3 digit terakhir
                const kodeUnik = Math.floor(Math.random() * 900) + 100;
                const totalBayar = price + kodeUnik;
                
                alert(`Silahkan transfer Rp ${totalBayar.toLocaleString()} ke QRIS Admin.\n\nKODE UNIK: ${kodeUnik}\nStatus: Menunggu Pembayaran.`);
                
                // Di sini nanti panggil API /api/checkout.js kamu
            }
        }

        function logout() {
            auth.signOut().then(() => window.location.replace("index.html"));
        }
    </script>
</body>
</html>
