<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace • RHF STORZ</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #141414;
            --border: #222;
            --danger: #ff4d4d;
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        /* Navbar */
        nav {
            padding: 15px 5%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Struk & Tracking Section */
        .tracking-card {
            background: var(--card);
            border: 2px dashed var(--gold);
            padding: 20px;
            border-radius: 15px;
            margin: 20px;
            animation: fadeIn 0.5s ease;
        }

        .receipt-body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            border-bottom: 1px dashed #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .track-steps { display: flex; justify-content: space-between; position: relative; margin: 20px 0 10px; }
        .step { flex: 1; text-align: center; z-index: 2; }
        .dot { width: 12px; height: 12px; background: #333; border-radius: 50%; margin: 0 auto 8px; transition: 0.3s; }
        .step span { font-size: 0.6rem; color: #555; font-weight: bold; }
        .track-line { position: absolute; top: 5px; left: 15%; right: 15%; height: 2px; background: #222; z-index: 1; }
        
        .step.active .dot { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .step.active span { color: #fff; }

        /* Chips Filter */
        .filter-container {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .chip {
            padding: 8px 18px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }

        /* Grid Produk */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; position: relative; }
        
        .label-tag { position: absolute; top: 8px; left: 8px; font-size: 0.55rem; padding: 3px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; z-index: 5; }
        .tag-biasa { background: #444; }
        .tag-menengah { background: #2980b9; }
        .tag-premium { background: var(--gold); color: #000; }
        .tag-limited { background: #c0392b; }

        .btn-buy { width: 100%; background: var(--gold); border: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div style="color: var(--gold); font-weight: bold; font-size: 1.1rem;">RHF STORZ</div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <span id="user-display" style="font-size: 0.7rem; color: #888;"></span>
            <button class="btn-logout" onclick="logoutSession()">Logout</button>
        </div>
    </nav>

    <div id="tracking-container" style="display: none;">
        <div class="tracking-card">
            <h4 style="text-align: center; margin-top: 0; color: var(--gold); font-size: 0.9rem;">🧾 STRUK PEMBAYARAN</h4>
            <div id="receipt-content" class="receipt-body">
                </div>
            <div class="track-steps">
                <div class="track-line"></div>
                <div class="step" id="s1"><div class="dot"></div><span>PROSES</span></div>
                <div class="step" id="s2"><div class="dot"></div><span>SEGERA</span></div>
                <div class="step" id="s3"><div class="dot"></div><span>SELESAI</span></div>
            </div>
            <p id="track-msg" style="font-size: 0.7rem; text-align: center; color: #888; margin-bottom: 0;"></p>
        </div>
    </div>

    <div class="filter-container">
        <div class="chip active" onclick="filterData('All', this)">Semua</div>
        <div class="chip" onclick="filterData('Biasa', this)">Biasa</div>
        <div class="chip" onclick="filterData('Menengah', this)">Menengah</div>
        <div class="chip" onclick="filterData('Premium', this)">Premium</div>
        <div class="chip" onclick="filterData('Limited', this)">Limited</div>
    </div>

    <div id="shop-grid" class="product-grid">
        </div>

    <div id="admin-gate"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
