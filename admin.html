<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHF Admin Panel • Premium Dashboard</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --gold: #d4af37;
      --dark: #0f0f0f;
      --gray: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #f1f1f1;
      min-height: 100vh;
    }

    header {
      background: rgba(15, 15, 15, 0.98);
      border-bottom: 1px solid var(--gold);
      padding: 25px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--gold);
    }

    .header-info {
      font-size: 1.1rem;
      color: #ccc;
    }

    .container {
      max-width: 1300px;
      margin: 40px auto;
      padding: 0 5%;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      margin-bottom: 25px;
      font-size: 2.2rem;
    }

    /* Tambah Produk Section */
    .add-section {
      background: var(--gray);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 50px;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #f1f1f1;
      font-size: 1rem;
    }

    button {
      background: var(--gold);
      color: #0f0f0f;
      padding: 14px 32px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #f0d68a;
      transform: translateY(-2px);
    }

    /* Orders Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--gray);
      border-radius: 12px;
      overflow: hidden;
    }

    th {
      background: #222;
      color: var(--gold);
      padding: 18px 15px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 18px 15px;
      border-top: 1px solid #333;
    }

    tr:hover {
      background: #252525;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 0.95rem;
      margin: 3px;
    }

    .auto { color: #4ade80; }
    .manual { color: #60a5fa; }
  </style>
</head>
<body>

  <header>
    <div class="logo">RHF Admin</div>
    <div class="header-info">
      Selamat datang, <strong>gacoruncek73@gmail.com</strong>
    </div>
  </header>

  <div class="container">

    <!-- TAMBAH PRODUK -->
    <div class="add-section">
      <h2>➕ Tambah Produk Baru</h2>
      <input type="text" id="prodName" placeholder="Nama Produk (contoh: Template Instagram Premium)">
      <input type="number" id="prodPrice" placeholder="Harga dalam Rupiah (contoh: 75000)">
      <textarea id="prodDesc" rows="4" placeholder="Deskripsi singkat produk..."></textarea>
      
      <select id="prodType">
        <option value="auto">✅ Otomatis - Link download dikirim via email</option>
        <option value="manual">📧 Manual - Admin kirim email sendiri</option>
      </select>

      <button onclick="tambahProduk()">Tambahkan ke Toko</button>
    </div>

    <!-- DAFTAR ORDER -->
    <h2>📋 Order Masuk (Real-time)</h2>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>Produk</th>
          <th>Pembeli</th>
          <th>Email</th>
          <th>Harga</th>
          <th>Status</th>
          <th>Tipe</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
      authDomain: "rhf-shop.firebaseapp.com",
      databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rhf-shop",
      storageBucket: "rhf-shop.firebasestorage.app",
      messagingSenderId: "1065902539657",
      appId: "1:1065902539657:web:ccb3cbdbecdcf81eb81758",
      measurementId: "G-HLNZZ2E26F"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const ADMIN_EMAIL = "gacoruncek73@gmail.com";

    // Cek autentikasi
    auth.onAuthStateChanged(user => {
      if (!user || user.email !== ADMIN_EMAIL) {
        alert("Akses ditolak! Hanya admin yang boleh masuk.");
        window.location.href = "login.html";
        return;
      }
      loadOrders();
    });

    // Tambah Produk
    function tambahProduk() {
      const name = document.getElementById("prodName").value.trim();
      const price = parseInt(document.getElementById("prodPrice").value);
      const desc = document.getElementById("prodDesc").value.trim();
      const type = document.getElementById("prodType").value;

      if (!name || !price) {
        alert("Nama produk dan harga harus diisi!");
        return;
      }

      db.ref("products").push({
        name: name,
        price: price,
        description: desc,
        type: type,
        timestamp: Date.now()
      }).then(() => {
        alert("✅ Produk berhasil ditambahkan ke toko!");
        // Reset form
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodDesc").value = "";
      }).catch(err => alert("Error: " + err.message));
    }

    // Load Order Real-time
    function loadOrders() {
      const tbody = document.querySelector("#ordersTable tbody");
      
      db.ref("orders").on("value", snapshot => {
        tbody.innerHTML = "";

        if (!snapshot.exists()) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px;">Belum ada order masuk</td></tr>`;
          return;
        }

        snapshot.forEach(child => {
          const o = child.val();
          const row = document.createElement("tr");
          
          row.innerHTML = `
            <td><strong>${o.productName}</strong></td>
            <td>${o.buyerName}</td>
            <td>${o.buyerEmail}</td>
            <td>Rp ${Number(o.price).toLocaleString('id-ID')}</td>
            <td><span class="status">${o.status || "Menunggu Konfirmasi"}</span></td>
            <td class="${o.type === 'auto' ? 'auto' : 'manual'}">
              ${o.type === 'auto' ? '✅ Otomatis' : '📧 Manual'}
            </td>
            <td>
              <button class="btn-small" onclick="updateStatus('${child.key}', 'Sudah Dibayar - Siap Kirim')">Konfirmasi Bayar</button>
              <button class="btn-small" onclick="kirimEmailManual('\( {child.key}', ' \){o.buyerEmail}', '${o.productName}')">Kirim Email</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      });
    }

    // Update Status Order
    function updateStatus(orderId, newStatus) {
      db.ref("orders/" + orderId).update({ 
        status: newStatus,
        updatedAt: Date.now()
      }).then(() => {
        alert("Status berhasil diupdate!");
      });
    }

    // Kirim Email Manual
    function kirimEmailManual(orderId, buyerEmail, productName) {
      const pesan = prompt(`Kirim email ke:\n${buyerEmail}\n\nUntuk produk: ${productName}\n\nTulis pesan / link download di sini:`);
      
      if (!pesan) return;

      db.ref("emailQueue").push({
        to: buyerEmail,
        subject: `Konfirmasi Order - ${productName} | RHF Shop`,
        message: pesan,
        orderId: orderId,
        timestamp: Date.now()
      }).then(() => {
        alert("✅ Pesan berhasil disimpan ke antrian email!\n\nAnda bisa kirim email ini nanti.");
      }).catch(err => alert("Error: " + err.message));
    }
  </script>
</body>
</html>
