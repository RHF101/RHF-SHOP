<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHF STORZ • Digital Premium</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
    
    :root {
      --gold: #d4af37;
      --dark: #0f0f0f;
      --card-bg: rgba(30, 30, 30, 0.95);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #050505, #1a1a1a);
      color: #f1f1f1;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Efek Background Cahaya */
    body::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--gold);
      filter: blur(150px);
      opacity: 0.1;
      z-index: -1;
      top: 10%;
      left: 10%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 24px;
      padding: 60px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.1);
      transition: border 0.3s ease;
    }

    .card:hover {
      border: 1px solid var(--gold);
    }

    .logo-container {
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--gold);
      margin: 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-top: 5px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    p { 
      color: #aaa; 
      font-size: 1rem;
      margin: 30px 0;
      line-height: 1.6;
    }

    .btn-login {
      background: linear-gradient(135deg, #d4af37, #f0d68a);
      color: #000;
      font-weight: 700;
      padding: 18px 0;
      width: 100%;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-login:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .btn-login svg {
      width: 20px;
      height: 20px;
    }

    .footer-text {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-container">
      <h1>RHF STORZ</h1>
      <div class="subtitle">Premium Market</div>
    </div>
    
    <p>Akses koleksi aset digital eksklusif dan layanan premium kami dalam satu ketukan.</p>
    
    <button class="btn-login" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
      </svg>
      Masuk dengan Google
    </button>

    <div class="footer-text">
      &copy; 2026 RHF STORZ. All rights reserved.
    </div>
  </div>

  <script>
    // Konfigurasi Firebase (Gunakan data dari console Firebase kamu)
    const firebaseConfig = {
      apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
      authDomain: "rhf-shop.firebaseapp.com",
      databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rhf-shop",
      storageBucket: "rhf-shop.firebasestorage.app",
      messagingSenderId: "1065902539657",
      appId: "1:1065902539657:web:ccb3cbdbecdcf81eb81758",
      measurementId: "G-HLNZZ2E26F"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();

    // Fungsi Login
    function loginGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      // Menggunakan signInWithPopup agar lebih smooth
      auth.signInWithPopup(provider)
        .then((result) => {
          console.log("User logged in:", result.user.displayName);
          window.location.replace("shop.html");
        })
        .catch(err => {
          console.error("Login Error:", err);
          alert("Gagal login: " + err.message);
        });
    }

    // Monitoring Status Login (Fix Redirect Loop)
    auth.onAuthStateChanged(user => {
      // Hanya redirect jika user ditemukan DAN kita berada di index.html (halaman login)
      if (user) {
        const currentPage = window.location.pathname;
        if (currentPage.includes("index.html") || currentPage === "/") {
          window.location.replace("shop.html");
        }
      }
    });
  </script>
</body>
</html>
