<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inti Arsitek • RHF STORZ</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #141414;
            --success: #27ae60;
            --process: #f39c12;
            --danger: #e74c3c;
            --border: #222;
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Overlay Keamanan */
        #admin-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px;
        }

        .header h1 { color: var(--gold); font-size: 1.2rem; margin: 0; }

        /* Form Tambah Produk */
        .admin-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 15px; margin-bottom: 30px;
        }

        .admin-card h2 { color: var(--gold); font-size: 1rem; margin-top: 0; margin-bottom: 20px; }

        .grid-form {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
        }

        input, select {
            background: #1a1a1a; border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: #fff; outline: none;
        }

        input:focus { border-color: var(--gold); }

        .btn-gold {
            background: var(--gold); color: #000; border: none;
            padding: 12px 25px; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px;
        }

        /* Tabel Transaksi */
        .table-container {
            background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #1a1a1a; color: #666; text-align: left; padding: 15px; font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        .status { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .status-pending { background: #444; color: #fff; }
        .status-process { background: var(--process); color: #000; }
        .status-success { background: var(--success); color: #fff; }

        .btn-action {
            padding: 6px 12px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 0.75rem; margin-right: 5px;
        }
    </style>
</head>
<body>

    <div id="admin-lock">
        <h2 style="color: var(--gold);">RHF CORE SYSTEM</h2>
        <p style="color: #555;">Mengautentikasi Arsitek...</p>
    </div>

    <div class="container">
        <div class="header">
            <h1>⚙️ DASHBOARD KONTROL</h1>
            <button onclick="auth.signOut()" style="background:transparent; border:1px solid #333; color:#888; padding:8px 15px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>

        <div class="admin-card">
            <h2>➕ TAMBAH PRODUK BARU</h2>
            <div class="grid-form">
                <input type="text" id="p-name" placeholder="Nama Produk">
                <input type="number" id="p-price" placeholder="Harga (Rp)">
                <input type="text" id="p-img" placeholder="URL Gambar">
                <select id="p-category">
                    <option value="All">Kategori: Umum</option>
                    <option value="Premium">Kategori: Premium</option>
                    <option value="Limited">Kategori: Limited</option>
                </select>
            </div>
            <button class="btn-gold" onclick="addProduct()">PUBLIKASIKAN PRODUK</button>
        </div>

        <div class="admin-card">
            <h2>📦 PESANAN & TRACKING (3 TAHAP)</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Produk</th>
                            <th>Total</th>
                            <th>Status Pelacakan</th>
                            <th>Kontrol Arsitek</th>
                        </tr>
                    </thead>
                    <tbody id="trx-list">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const MASTER_UID = "8VjkMJXIABd51kcCRlx8eqhZMZy2";

        // PROTEKSI INTI
        auth.onAuthStateChanged(user => {
            if (user && user.uid === MASTER_UID) {
                document.getElementById('admin-lock').style.display = 'none';
                loadTrx();
            } else {
                window.location.replace("/shop");
            }
        });

        // FUNGSI TAMBAH PRODUK
        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            const cat = document.getElementById('p-category').value;

            if(!name || !price || !img) return alert("Lengkapi data produk!");

            const newId = "RHF" + Date.now();
            db.ref('products/' + newId).set({
                id: newId,
                name: name,
                price: price,
                image: img,
                label: cat,
                stock: 99
            }).then(() => {
                alert("Produk Berhasil Ditambahkan!");
                location.reload();
            });
        }

        // MUAT TRANSAKSI & KONTROL 3 TAHAP
        function loadTrx() {
            db.ref('transactions').on('value', snap => {
                const list = document.getElementById('trx-list');
                list.innerHTML = '';
                const data = snap.val();

                for(let id in data) {
                    const t = data[id];
                    list.innerHTML += `
                        <tr>
                            <td>${t.userName}<br><small style="color:#555">${t.userEmail}</small></td>
                            <td>${t.productName}</td>
                            <td>Rp ${t.total.toLocaleString()}</td>
                            <td><span class="status status-${t.status.toLowerCase()}">${t.status}</span></td>
                            <td>
                                ${t.status === 'Pending' ? `
                                    <button class="btn-action" style="background:#f39c12" onclick="setStep('${id}', 'Process')">Klik Tahap 2 (Segera)</button>
                                ` : ''}
                                ${t.status === 'Process' ? `
                                    <button class="btn-action" style="background:#27ae60" onclick="setStep('${id}', 'Success')">Klik Tahap 3 (Selesai)</button>
                                ` : ''}
                                <button class="btn-action" style="background:#e74c3c" onclick="setStep('${id}', 'Failed')">Tolak</button>
                            </td>
                        </tr>
                    `;
                }
            });
        }

        function setStep(id, step) {
            if(confirm("Lanjutkan ke tahap " + step + "?")) {
                db.ref('transactions/' + id).update({ status: step });
            }
        }
    </script>
</body>
</html>
