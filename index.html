<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>RHF STORZ • Solusi Arsitektur Script Premium</title>
    <meta name="description" content="Dapatkan script dan tools eksklusif hanya di RHF STORZ. Keamanan terjamin, transaksi transparan.">
    <meta property="og:title" content="RHF STORZ • Premium Store">
    <meta property="og:description" content="Layanan otomatis dengan sistem pelacakan pesanan real-time.">
    <link rel="icon" href="https://via.placeholder.com/32/d4af37/000000?text=R">

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-google {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-google:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--gold);
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>RHF STORZ</h1>
        <p>Masuk ke portal eksklusif untuk mengakses koleksi script dan layanan premium kami.</p>
        
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="24" alt="Google Logo">
            Masuk dengan Google
        </button>

        <div id="status-msg"></div>

        <div class="footer-text">
            Sistem Terenkripsi & Diawasi oleh Arsitek
        </div>
    </div>

    <script>
        // Konfigurasi Firebase (POINT 5: Tetap Gunakan Config Terpusat)
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Cek jika user sudah login sebelumnya
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('status-msg').innerText = "Mengalihkan ke Marketplace...";
                setTimeout(() => {
                    window.location.replace("shop.html");
                }, 1000);
            }
        });

        async function login() {
            const status = document.getElementById('status-msg');
            status.innerText = "Membuka Autentikasi...";
            
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // POINT 2: Kirim Notifikasi Chat Otomatis saat user pertama kali login/masuk
                await db.ref('chats').push({
                    uid: "SYSTEM",
                    name: "SYSTEM BOT",
                    text: `👤 User ${user.displayName} baru saja masuk ke sistem.`,
                    time: new Date().toLocaleTimeString(),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                status.innerText = "Login Berhasil!";
                window.location.replace("shop.html");
                
            } catch (error) {
                console.error(error);
                status.innerText = "Gagal masuk. Coba lagi.";
            }
        }
    </script>
</body>
</html>
