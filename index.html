<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF STORZ • GATEWAY</title>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37; --dark: #050505; --border: #1a1a1a;
        }

        body {
            background: var(--dark); color: #fff; font-family: 'Inter', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }

        .gate-card {
            background: #0f0f0f; border: 1px solid var(--border);
            padding: 40px; border-radius: 30px; text-align: center;
            width: 90%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; font-size: 2.5rem; }
        h1 span { color: var(--gold); }
        p { color: #555; font-size: 0.8rem; margin-bottom: 30px; }

        .btn-main {
            background: #fff; color: #000; border: none; padding: 18px;
            width: 100%; border-radius: 15px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px;
            transition: 0.3s; font-size: 0.8rem;
        }
        .btn-main:hover { transform: scale(1.02); background: var(--gold); }

        .btn-guest {
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 15px; width: 100%; border-radius: 15px; font-weight: 700;
            cursor: pointer; font-size: 0.75rem; transition: 0.3s;
        }
        .btn-guest:hover { background: rgba(212, 175, 55, 0.1); }

        .user-active {
            margin-top: 20px; padding: 15px; border-radius: 15px;
            background: #151515; display: none; align-items: center; gap: 10px;
        }
        .user-active img { width: 30px; height: 30px; border-radius: 50%; }

        #loader { font-family: 'JetBrains Mono'; color: var(--gold); font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="gate-card">
        <h1>RHF<span>STORZ</span></h1>
        <p>Premium Architectural Digital Assets</p>

        <div id="auth-ui">
            <div id="loader">INITIALIZING SYSTEM...</div>
        </div>
        
        <div style="margin-top: 40px;">
            <a href="admin.html" style="color: #111; text-decoration: none; font-size: 0.6rem;">ADMIN ACCESS</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVqKwHmRBxWu5hjulwmhradnGbp0yFhbY",
            authDomain: "rhf-shop.firebaseapp.com",
            databaseURL: "https://rhf-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rhf-shop",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 1. CEK STATUS LOGIN
        auth.onAuthStateChanged(user => {
            const ui = document.getElementById('auth-ui');
            if (user) {
                // Jika sudah login
                ui.innerHTML = `
                    <div class="user-active" style="display:flex;">
                        <img src="${user.photoURL}" alt="U">
                        <div style="text-align:left">
                            <div style="font-weight:900; font-size:0.75rem;">${user.displayName}</div>
                            <div style="font-size:0.6rem; color:#555;">Verified Member</div>
                        </div>
                    </div>
                    <button class="btn-main" style="margin-top:15px;" onclick="window.location.href='shop.html'">ENTER SHOP</button>
                    <button onclick="auth.signOut()" style="background:none; border:none; color:#444; font-size:0.6rem; cursor:pointer; margin-top:10px;">LOGOUT ACCOUNT</button>
                `;
            } else {
                // Jika Guest
                ui.innerHTML = `
                    <button class="btn-main" onclick="loginGoogle()">LOGIN WITH GOOGLE</button>
                    <button class="btn-guest" onclick="window.location.href='shop.html'">CONTINUE AS GUEST</button>
                `;
            }
        });

        // 2. FUNGSI LOGIN
        function loginGoogle() {
            auth.signInWithPopup(provider).then(() => {
                window.location.href = "shop.html";
            }).catch(err => alert(err.message));
        }
    </script>
</body>
</html>
